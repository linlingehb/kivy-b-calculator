name: Build Kivy APK with Buildozer

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    # 支持手动触发：在 GitHub 仓库的 Actions 页面点击 "Run workflow"

jobs:
  build:
    name: Build for Android
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 首次构建可能耗时较长，最长 6 小时

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull kivy/buildozer Docker image
        run: docker pull kivy/buildozer:latest

      - name: Build Debug APK with Docker
        run: |
          mkdir -p "$HOME/.buildozer"
          docker run --rm \
            --user 1000:1000 \
            -e HOME=/home/user \
            -e CI=true \
            -v "$HOME/.buildozer":/home/user/.buildozer \
            -v "$PWD":/home/user/hostcwd \
            -w /home/user/hostcwd \
            kivy/buildozer:latest \
            android debug --verbose

      - name: Fix APK permissions (artifacts only)
        if: always()
        run: |
          sudo chown -R $(id -u):$(id -g) bin || true

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kivy-calculator-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload buildozer logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs
          path: |
            .buildozer/android/platform/*/buildozer.log
            .buildozer/android/platform/*/log
            .buildozer/*.log
          if-no-files-found: warn
