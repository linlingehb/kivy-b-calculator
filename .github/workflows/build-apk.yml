name: Build Kivy APK with Buildozer

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build for Android
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull kivy/buildozer Docker image
        run: docker pull kivy/buildozer:latest

      - name: Make source writable for container user
        run: |
          # Only change ownership of source files (exclude .git)
          sudo find "$PWD" -mindepth 1 -maxdepth 1 ! -name '.git' -exec chown -R 1000:1000 {} + 2>/dev/null || true

      - name: Build Debug APK with Docker
        run: |
          mkdir -p "$HOME/.buildozer"
          sudo chown -R 1000:1000 "$HOME/.buildozer"
          docker run --rm \
            -e HOME=/home/user \
            -e CI=true \
            -v "$HOME/.buildozer":/home/user/.buildozer \
            -v "$PWD":/home/user/hostcwd \
            -w /home/user/hostcwd \
            kivy/buildozer:latest \
            android debug --verbose

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kivy-calculator-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload buildozer logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs
          path: |
            .buildozer/android/platform/*/buildozer.log
            .buildozer/android/platform/*/log
            .buildozer/*.log
          if-no-files-found: warn
