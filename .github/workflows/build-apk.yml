name: Build Kivy APK with Buildozer

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    # 支持手动触发：在 GitHub 仓库的 Actions 页面点击 "Run workflow"

jobs:
  build:
    name: Build for Android
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 首次构建可能耗时较长，最长 6 小时

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix permissions for Docker user
        run: |
          # kivy/buildozer 容器内用户为 user(uid=1000)，需要确保源码可读写
          sudo chown -R 1000:1000 "$PWD"

      - name: Pull kivy/buildozer Docker image
        run: docker pull kivy/buildozer:latest

      - name: Build Debug APK with Docker
        run: |
          mkdir -p "$HOME/.buildozer"
          docker run --rm \
            -v "$HOME/.buildozer":/home/user/.buildozer \
            -v "$PWD":/home/user/hostcwd \
            -w /home/user/hostcwd \
            kivy/buildozer:latest \
            android debug

      - name: Fix APK permissions
        run: |
          # 容器内生成文件的 owner 可能是容器内的 user(1000)，改回 runner 用户以便上传 artifact
          sudo chown -R $(id -u):$(id -g) "$PWD"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kivy-calculator-apk
          path: bin/*.apk
          if-no-files-found: error
